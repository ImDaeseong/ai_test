<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LRC Tagger</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <h1>LRC Tagger</h1>

    <!-- 파일 업로드 -->
    <section id="upload-section">
      <label for="audio-input" id="drop-zone">
        <span id="drop-label">오디오 파일을 끌어다 놓거나 클릭하여 선택</span>
        <input type="file" id="audio-input" accept="audio/*,video/mp4,.m4a,.webm" hidden>
      </label>
      <div id="file-info"></div>
      <div id="lyrics-input-wrap">
        <label for="lyrics-input">가사 텍스트 (선택 — 입력 시 정렬 정확도 향상)</label>
        <textarea id="lyrics-input" rows="8"
          placeholder="가사를 한 줄씩 붙여넣으세요&#10;(비워두면 Whisper 자동 전사만 사용)"></textarea>
      </div>
      <button id="transcribe-btn" disabled>전사 시작 (Whisper)</button>
      <div id="status"></div>
    </section>

    <!-- 오디오 플레이어 -->
    <section id="player-section" hidden>
      <audio id="audio-player" controls></audio>
      <div id="time-display">
        <span id="current-time">0:00.000</span> / <span id="duration">0:00.000</span>
      </div>
      <div id="shortcuts-hint">
        <b>Space</b> 현재 시간 입력 &nbsp;|&nbsp;
        <b>Enter</b> 다음 줄 &nbsp;|&nbsp;
        <b>P</b> 재생/정지 &nbsp;|&nbsp;
        <b>← →</b> 2초 이동
      </div>
    </section>

    <!-- 가사 리스트 -->
    <section id="lyrics-section" hidden>
      <div id="lyrics-toolbar">
        <button id="download-lrc-btn">LRC 다운로드</button>
        <button id="reset-times-btn">타이밍 초기화</button>
      </div>
      <div id="lyrics-list"></div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
