collector:
  polling_interval_seconds: 3.0
  include_tcp: true
  include_udp: true
  include_ipv6: true
  process_cache_ttl_seconds: 30.0

storage:
  sqlite_enabled: true
  json_export_enabled: true
  database_path: data/port_monitor.sqlite3
  json_export_path: data/port_records.jsonl
  sqlite_busy_timeout_ms: 5000
  retention_days: 30
  batch_size: 500

logging:
  log_dir: logs
  log_file: port_monitor.log
  level: INFO
  max_bytes: 5242880
  backup_count: 5

service:
  name: WindowsPortMonitor
  display_name: Windows TCP/UDP Port Monitor
  description: Collects TCP/UDP port, connection, and process metadata for local observability.
